<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Loja games</title>
</head>
<body>

  <div class="container"> 

   <div class="card col-md-4 mt-3">
     <div class="card-header" >
        <h4 class="card-title">Lista de Games(rota get) </h4>
     </div>
     <div class="card-body">


        <ul class="list-group" id="games"></ul>

      <div class="card mt-3">
        <div class="card-header" >
            <h4 class="card-title">Novo Game (Rota Post)</h4>
        </div>
        <div class="card-body">
            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">Titulo</span>
                <input type="text" name="title"  id="title" class="form-control" placeholder="Titulo" aria-label="Titulo" aria-describedby="basic-addon1">
            </div><br>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">Preço:</span>
                <input type="number" id="price" name="price" class="form-control" placeholder="preço" aria-label="Titulo" aria-describedby="basic-addon1">
            </div><br>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">Ano de Lançamento:</span>
                <input type="number" name="year" id="year" placeholder="Ano de Laçamento" class="form-control"  aria-label="Titulo" aria-describedby="basic-addon1">
            </div><br>

           <button type="button" class="btn btn-primary">Cadastrar</button>
        </div>

      </div>
        
     </div>
   
   </div>

</div>


    

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script>



       function createGame(){

          var titleInput = document.getElementById("title");
          var priceInput = document.getElementById("price");
          var yearInput = document.getElementById("title");

          var game = {

              title: titleInput.value,
              price: priceInput.value,
              year: yearInput
          }



       }







        axios.get('http://localhost:8000/games').then(response =>{

            var games = response.data;

            var list = document.getElementById("games");

            games.forEach(game => {

                var item = document.createElement("li");
                item.innerHTML = ' ID: ' + game.id + "| TITULO: " + game.title + " | VALOR: R$: " + game.price;
                item.classList.add('list-group-item');
                list.appendChild(item);
                
            });

            console.log(response);

        }).catch(error =>{

            console.log(error);

        });
    </script>    
</body>
</html>
